<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demi</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .about-btn {
      margin-top: 28px;
      display: inline-block;
      font-family: 'Exo 2', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .25em;
      text-transform: uppercase;
      text-decoration: none;
      color: #ffffff;
      border: 1px solid rgba(90, 180, 255, 0.45);
      padding: 12px 32px;
      border-radius: 4px;
      background: rgba(90, 180, 255, 0.07);
      transition: background .25s, border-color .25s, box-shadow .25s;
      animation: fadeUp 1.5s cubic-bezier(0.22, 1, 0.36, 1) 0.75s both;
    }

    .about-btn:hover {
      background: rgba(90, 180, 255, 0.18);
      border-color: rgba(90, 180, 255, 0.85);
      box-shadow: 0 0 18px rgba(90, 180, 255, 0.3);
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grid"></div>
  <div class="snow" id="snow"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="stage">

    <div class="char-wrap">
      <div class="floor-glow"></div>
      <img src="demi.png" alt="Demi fighter" />
    </div>

    <h1 class="name">DEMILADE MOMOLOSHO</h1>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-dot"></div>
      <div class="div-line"></div>
    </div>

    <div class="welcome">
      <p class="line1">Hey &mdash; nice to see you here.</p>
      <p class="line2">Welcome to my world</p>
    </div>

    <a class="about-btn" href="aboutme.html">About Me</a>

  </div>

  <script src="script.js"></script>

</body>
</html>
